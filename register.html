<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ValoRentals - Create your account and start renting premium bikes today.">
  <title>ValoRentals - Register</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏍️</text></svg>">
</head>
<body>
  <!-- Register Page -->
  <section class="auth-page" id="registerPage">
    <div class="auth-container slide-up">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">🏍️</div>
        <h2>Create Account</h2>
        <p>Join ValoRentals and start your journey</p>
      </div>

      <!-- Alert Message -->
      <div class="alert" id="registerAlert">
        <span id="registerAlertIcon"></span>
        <span id="registerAlertMsg"></span>
      </div>

      <!-- Register Form -->
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="regEmail">Email Address</label>
          <input type="email" id="regEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="regPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label for="regConfirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('regConfirmPassword', this)">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
          Create Account
        </button>
      </form>

      <!-- Footer -->
      <div class="form-footer" style="margin-top: 24px;">
        <p>Already have an account? <a href="index.html">Sign In</a></p>
      </div>
    </div>
  </section>

  <!-- Auth Script -->
  <script type="module" src="js/auth.js"></script>
</body>
</html>
